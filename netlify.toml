[build]
  command = "vite build"
  publish = "dist/client"

# The @netlify/vite-plugin-tanstack-start plugin generates a catch-all SSR
# function that handles every route (public pages, _authenticated routes,
# server functions, and /api/* server routes). The redirects it injects take
# priority over anything declared here, so no manual SPA fallback is needed.
#
# Do NOT add a `/* -> /index.html` fallback: TanStack Start does not emit a
# usable index.html for SSR routes, so that rule would short-circuit the SSR
# function and serve a blank shell (the "Page not found" symptom).
